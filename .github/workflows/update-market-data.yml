name: Update market data

on:
  schedule:
    # GitHub Actions cron is UTC.
    # 03:00 UTC = 12:00 KST, 06:40 UTC = 15:40 KST, 11:10 UTC = 20:10 KST.
    # Runs every day; non-trading days usually produce no data change.
    - cron: '0 3 * * *'
    - cron: '40 6 * * *'
    - cron: '10 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Fetch market data
        run: npm run fetch:data

      - name: Build check
        run: npm run build

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update market data'
          file_pattern: public/data/market-data.json
