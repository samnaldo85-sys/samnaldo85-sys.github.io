name: Update market data

on:
  schedule:
    # GitHub Actions cron is UTC.
    # 03:00 UTC = 12:00 KST, 06:40 UTC = 15:40 KST, 11:10 UTC = 20:10 KST.
    - cron: "0 3 * * 1-5"
    - cron: "40 6 * * 1-5"
    - cron: "10 11 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          npm install
          python -m pip install --upgrade pip
          pip install pykrx finance-datareader pandas requests

      - name: Fetch market data
        run: npm run fetch:data

      - name: Build check
        run: npm run build

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update market data'
          file_pattern: public/data/market-data.json
